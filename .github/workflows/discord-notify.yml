name: Discord Notification

on:
  push:
    branches: ["main"]
  create:
  delete:
  fork:
  pull_request:
    types: [opened, closed, reopened, edited, labeled, unlabeled, assigned, unassigned, review_requested, synchronize, converted_to_draft, ready_for_review]
  issues:
    types: [opened, closed, reopened, edited, labeled, unlabeled, assigned, unassigned, deleted]
  watch:
    types: [started]
  deployment:
  label:
    types: [created, edited, deleted]
  release:
    types: [published, prereleased, edited, deleted]

jobs:
  notify-general:
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    steps:

      - name: Notify Push
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commits = github.event.commits.slice(0, 10);
            const desc = commits.map(c => `\`${c.id.slice(0,7)}\` ${c.message.split('\n')[0].slice(0,72)} — ${c.author.name}`).join('\n');
            const payload = {
              embeds: [{
                color: 0x5865F2,
                author: { name: github.actor, icon_url: `https://github.com/${github.actor}.png` },
                title: `[${github.ref_name}] ${github.event.commits.length} new commit${github.event.commits.length>1?'s':''}`,
                url: github.event.compare,
                description: desc,
                footer: { text: `ChromaShift · ${github.repository}` },
                timestamp: new Date().toISOString()
              }]
            };
            await require('node-fetch')(process.env.DISCORD_UPDATE_NOTIFY, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });

      - name: Notify Create
        if: github.event_name == 'create'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const type = github.event.ref_type;
            const ref = github.event.ref;
            const emoji = type === 'tag' ? '🏷️' : '🌿';
            const payload = {
              embeds: [{
                color: 0x57F287,
                author: { name: github.actor, icon_url: `https://github.com/${github.actor}.png` },
                title: `${emoji} New ${type} created: \`${ref}\``,
                url: `https://github.com/${github.repository}/tree/${ref}`,
                footer: { text: `ChromaShift · ${github.repository}` },
                timestamp: new Date().toISOString()
              }]
            };
            await require('node-fetch')(process.env.DISCORD_UPDATE_NOTIFY, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });

      - name: Notify Delete
        if: github.event_name == 'delete'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const type = github.event.ref_type;
            const ref = github.event.ref;
            const payload = {
              embeds: [{
                color: 0xED4245,
                author: { name: github.actor, icon_url: `https://github.com/${github.actor}.png` },
                title: `🗑️ ${type} deleted: \`${ref}\``,
                footer: { text: `ChromaShift · ${github.repository}` },
                timestamp: new Date().toISOString()
              }]
            };
            await require('node-fetch')(process.env.DISCORD_UPDATE_NOTIFY, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });

      - name: Notify Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const actionMap = {
              opened:'🔀 PR Opened', closed:'✅ PR Closed', reopened:'🔄 PR Reopened',
              edited:'📝 PR Edited', labeled:'🏷️ PR Labeled', unlabeled:'🏷️ PR Unlabeled',
              assigned:'👤 PR Assigned', unassigned:'👤 PR Unassigned', review_requested:'👀 Review Requested',
              synchronize:'🔃 PR Updated', converted_to_draft:'📋 PR → Draft', ready_for_review:'✅ PR Ready for Review'
            };
            const merged = github.event.pull_request.merged;
            const label = merged ? '🟣 PR Merged' : (actionMap[github.event.action] || `🔀 PR ${github.event.action}`);
            const body = github.event.pull_request.body ? github.event.pull_request.body.slice(0,200) : 'No description.';
            const payload = {
              embeds: [{
                color: merged ? 0x8957E5 : 0xFEE75C,
                author: { name: github.actor, icon_url: `https://github.com/${github.actor}.png` },
                title: `${label}: ${github.event.pull_request.title}`,
                url: github.event.pull_request.html_url,
                description: body,
                fields: [
                  { name: 'Branch', value: `\`${github.event.pull_request.head.ref}\` → \`${github.event.pull_request.base.ref}\``, inline: true },
                  { name: 'Changes', value: `+${github.event.pull_request.additions} / -${github.event.pull_request.deletions}`, inline: true }
                ],
                footer: { text: `ChromaShift · ${github.repository}` },
                timestamp: new Date().toISOString()
              }]
            };
            await require('node-fetch')(process.env.DISCORD_UPDATE_NOTIFY, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });

  notify-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Notify Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const actionMap = {
              published:'🚀 New Release Published',
              prereleased:'🧪 Pre-release Published',
              edited:'📝 Release Edited',
              deleted:'🗑️ Release Deleted'
            };
            const action = github.event.action;
            const label = actionMap[action] || `📦 Release ${action}`;
            const body = github.event.release.body ? github.event.release.body.slice(0,500) : 'No release notes.';
            const prerelease = github.event.release.prerelease;
            const name = github.event.release.name || github.event.release.tag_name;
            const payload = {
              embeds: [{
                color: { published:0x57F287, prereleased:0xFEE75C, deleted:0xED4245 }[action] || 0x5865F2,
                author: { name: github.actor, icon_url: `https://github.com/${github.actor}.png` },
                title: `${label}: ${name}`,
                url: github.event.release.html_url,
                description: body,
                fields: [
                  { name: 'Tag', value: `\`${github.event.release.tag_name}\``, inline: true },
                  { name: 'Type', value: prerelease ? 'Pre-release' : 'Stable', inline: true }
                ],
                footer: { text: `ChromaShift · ${github.repository}` },
                timestamp: new Date().toISOString()
              }]
            };
            await require('node-fetch')(process.env.DISCORD_UPDATE_NOTIFY_RELEASE, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
